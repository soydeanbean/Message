<html lang="en">

<title>Music</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050308;--accent:rgba(180,130,200,0.5);--glow-color:rgba(160,100,200,0.35);--word-dim:rgba(255,255,255,0.08);--word-mid:rgba(255,255,255,0.35);--word-lit:rgba(255,255,255,0.96);--emotion-label-color:rgba(180,130,200,0.45)}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'EB Garamond',Georgia,serif;-webkit-font-smoothing:antialiased;color:white}
#bg{position:fixed;inset:0;z-index:0;transition:background 5s cubic-bezier(0.4,0,0.2,1);background:radial-gradient(ellipse 80% 60% at 50% 40%, #1a0828 0%, #0a0518 50%, #050308 100%)}
#grain{position:fixed;inset:0;z-index:1;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:200px 200px;pointer-events:none}
#stars{position:fixed;inset:0;z-index:1;pointer-events:none}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--dur,4s) ease-in-out infinite var(--delay,0s) alternate}
@keyframes twinkle{0%{opacity:0.1}100%{opacity:0.7}}
#vignette{position:fixed;inset:0;z-index:2;background:radial-gradient(ellipse 65% 65% at 50% 50%, transparent 20%, rgba(0,0,0,0.85) 100%);pointer-events:none}
#particles{position:fixed;inset:0;z-index:3;pointer-events:none;overflow:hidden}
.pt{position:absolute;border-radius:50%;animation:rise linear forwards;opacity:0}
@keyframes rise{0%{opacity:0;transform:translateY(0) scale(0.5)}15%{opacity:1}80%{opacity:0.4}100%{opacity:0;transform:translateY(-180px) scale(0.1)}}
.ripple{position:fixed;border-radius:50%;border:1px solid var(--glow-color);pointer-events:none;z-index:4;animation:ripple-out 2s ease-out forwards;transform:translate(-50%,-50%) scale(0)}
@keyframes ripple-out{0%{opacity:0.6;transform:translate(-50%,-50%) scale(0)}100%{opacity:0;transform:translate(-50%,-50%) scale(4)}}
#stage{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 100px}
#lyric-wrap{position:relative;text-align:center;max-width:min(640px,90vw);min-height:120px;display:flex;align-items:center;justify-content:center}
#lyric-text{font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.6rem,5.5vw,2.8rem);font-weight:300;line-height:1.55;letter-spacing:0.03em;text-align:center;position:relative}
.word{display:inline-block;color:var(--word-dim);transition:color 0.18s ease,text-shadow 0.18s ease,transform 0.18s ease;transform-origin:center bottom;white-space:nowrap;will-change:color,transform;position:relative}
.word.lit{color:var(--word-lit);text-shadow:0 0 30px var(--glow-color),0 0 60px rgba(160,100,200,0.2),0 0 100px rgba(160,100,200,0.08);transform:scale(1.06) translateY(-1px)}
.word.past{color:var(--word-mid)}
.word-space{display:inline-block;width:0.28em;color:transparent;user-select:none}
#lyric-text.entering{animation:line-in 0.55s cubic-bezier(0.22,1,0.36,1) forwards}
#lyric-text.exiting{animation:line-out 0.4s cubic-bezier(0.4,0,1,1) forwards}
@keyframes line-in{0%{opacity:0;transform:translateY(22px) scale(0.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes line-out{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-18px) scale(0.96)}}
#emotion{position:fixed;top:80px;left:0;right:0;text-align:center;z-index:20;font-family:'Montserrat',sans-serif;font-weight:100;font-size:0.65rem;letter-spacing:0.55em;text-transform:uppercase;color:var(--emotion-label-color);transition:color 3s ease,opacity 1s ease;display:flex;align-items:center;justify-content:center;gap:10px}
#emotion .ei{opacity:0.5;transition:all 2s ease}
#topbar{position:fixed;top:0;left:0;right:0;height:64px;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px}
#song-meta{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden}
#song-name{font-family:'Playfair Display',serif;font-size:0.82rem;font-weight:400;letter-spacing:0.05em;color:rgba(255,255,255,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#artist-name{font-family:'Montserrat',sans-serif;font-weight:100;font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.25)}
#ctrl-play{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.7);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s ease;flex-shrink:0;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#ctrl-play:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.35);color:white;transform:scale(1.07)}
#ctrl-play:active{transform:scale(0.95)}
#bottombar{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:0 20px 20px;display:flex;flex-direction:column;gap:10px}
#seekwrap{display:flex;align-items:center;gap:12px}
#seek{-webkit-appearance:none;appearance:none;flex:1;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;outline:none;cursor:pointer;transition:height 0.2s}
#seek:hover{height:3px}
#seek::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.7);cursor:pointer;transition:transform 0.2s,background 0.2s}
#seek:hover::-webkit-slider-thumb{transform:scale(1.3);background:white}
#seek::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.7);border:none;cursor:pointer}
#time{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.65rem;letter-spacing:0.15em;color:rgba(255,255,255,0.25);white-space:nowrap;min-width:72px;text-align:right}
#progress-track{height:1px;background:rgba(255,255,255,0.06);position:relative;overflow:hidden;border-radius:1px}
#progress-fill{height:100%;background:linear-gradient(90deg,rgba(160,100,200,0.5),rgba(220,180,255,0.5));width:0%;transition:width 0.5s linear;border-radius:1px}
#splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#050308;cursor:pointer;transition:opacity 1.4s cubic-bezier(0.4,0,0.2,1)}
#splash.gone{opacity:0;pointer-events:none}
#sp-icon{margin-bottom:12px;opacity:0.35;animation:sp-pulse 3s ease-in-out infinite}
@keyframes sp-pulse{0%,100%{opacity:0.25;transform:scale(1)}50%{opacity:0.55;transform:scale(1.08)}}
#sp-title{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,7vw,3.2rem);font-weight:300;font-style:italic;letter-spacing:0.02em;color:rgba(255,255,255,0.8);text-align:center;line-height:1.2}
#sp-artist{font-family:'Montserrat',sans-serif;font-weight:100;font-size:0.72rem;letter-spacing:0.5em;text-transform:uppercase;color:rgba(255,255,255,0.28)}
#sp-tap{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.68rem;letter-spacing:0.4em;text-transform:uppercase;color:rgba(255,255,255,0.18);margin-top:28px;display:flex;align-items:center;gap:8px;animation:sp-breathe 2.5s ease-in-out infinite}

#hb.flash{animation:hb-flash 1.2s ease forwards}
@keyframes hb-flash{0%{opacity:0}15%{opacity:1}60%{opacity:0.4}100%{opacity:0}}
@media(max-width:480px){#topbar{padding:0 16px}#bottombar{padding:0 16px 18px}#sp-title{font-size:2rem}}

</head>

<div id="splash">

  <div id="sp-title">The Night We Met</div>
  <div id="sp-artist">Lord Huron</div>
  <div id="sp-tap">

  </button>
</div>

<div id="emotion">

</div>

<div id="stage">
  <div id="lyric-wrap">

  </div>

// ─── EMOTIONS ───
const EMOTIONS = [
  { t:0,      icon:'moon',        label:'longing',   bg:'radial-gradient(ellipse 80% 60% at 50% 40%, #1a0828 0%, #0a0518 55%, #050308 100%)',  gc:'rgba(160,100,200,0.35)' },
  { t:28,     icon:'wind',        label:'adrift',    bg:'radial-gradient(ellipse 70% 70% at 45% 35%, #1e0e30 0%, #0c0620 55%, #050308 100%)',  gc:'rgba(140,90,210,0.35)' },
  { t:44.59,  icon:'compass',     label:'searching', bg:'radial-gradient(ellipse 75% 55% at 55% 45%, #280c1e 0%, #160814 55%, #060208 100%)',  gc:'rgba(200,90,140,0.4)' },
  { t:51.36,  icon:'heart-crack', label:'broken',    bg:'radial-gradient(ellipse 60% 70% at 40% 40%, #300818 0%, #180610 55%, #060208 100%)',  gc:'rgba(200,60,100,0.4)' },
  { t:87.35,  icon:'ghost',       label:'haunted',   bg:'radial-gradient(ellipse 65% 65% at 50% 50%, #1c0828 0%, #0e0418 55%, #050210 100%)',  gc:'rgba(140,80,200,0.45)' },
  { t:102.12, icon:'ghost',       label:'haunted',   bg:'radial-gradient(ellipse 65% 65% at 50% 50%, #200830 0%, #0e041c 55%, #050210 100%)',  gc:'rgba(120,70,190,0.5)' },
  { t:116.62, icon:'cloud-rain',  label:'terror',    bg:'radial-gradient(ellipse 60% 55% at 35% 40%, #2e0810 0%, #180608 55%, #060208 100%)',  gc:'rgba(220,70,80,0.4)' },
  { t:123.62, icon:'droplets',    label:'tears',     bg:'radial-gradient(ellipse 65% 60% at 55% 35%, #200a14 0%, #100610 55%, #060208 100%)',  gc:'rgba(180,60,90,0.35)' },
  { t:137.86, icon:'heart-crack', label:'grief',     bg:'radial-gradient(ellipse 60% 65% at 45% 50%, #280820 0%, #140618 55%, #060210 100%)',  gc:'rgba(190,70,170,0.4)' },
  { t:145.36, icon:'ghost',       label:'haunted',   bg:'radial-gradient(ellipse 65% 65% at 50% 50%, #1a0628 0%, #0c041c 55%, #050210 100%)',  gc:'rgba(130,70,200,0.5)' },
  { t:160.14, icon:'moon',        label:'longing',   bg:'radial-gradient(ellipse 70% 60% at 50% 50%, #1e0830 0%, #0e0420 55%, #050210 100%)',  gc:'rgba(150,90,210,0.5)' },
  { t:167.11, icon:'ellipsis',    label:'…',         bg:'radial-gradient(ellipse 30% 30% at 50% 50%, #0a0418 0%, #040210 100%)',               gc:'rgba(80,60,140,0.18)' }
];

// ─── STARS ───
const starsEl = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*1.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${3+Math.random()*6}s;--delay:${-Math.random()*8}s;`;
  starsEl.appendChild(s);
}

// ─── DOM REFS ───
const audio        = document.getElementById('audio');
const playBtn      = document.getElementById('ctrl-play');
const playIcon     = document.getElementById('play-icon');
const seekEl       = document.getElementById('seek');
const timeEl       = document.getElementById('time');
const progressFill = document.getElementById('progress-fill');
const bgEl         = document.getElementById('bg');
const emotionTextEl= document.getElementById('emotion-text');
const emotionIconEl= document.getElementById('emotion-icon');
const lyricTextEl  = document.getElementById('lyric-text');
const splash       = document.getElementById('splash');
const hbEl         = document.getElementById('hb');
const particlesEl  = document.getElementById('particles');

// ─── STATE ───
let playing       = false;
let fakeTime      = 0;
let lastStamp     = null;
let curLineIdx    = -1;
let curEmotionIdx = -1;
let rafId         = null;
const DURATION    = 208;

// ─── UTILS ───
const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
function setIcon(el,name){el.setAttribute('data-lucide',name);lucide.createIcons({nodes:[el]});}

// ─── RENDER LINE ───
let lineTimeout = null;
function renderLine(lineIdx) {
  if(lineIdx === curLineIdx) return;
  curLineIdx = lineIdx;

  lyricTextEl.classList.remove('entering');
  lyricTextEl.classList.add('exiting');
  clearTimeout(lineTimeout);

  lineTimeout = setTimeout(()=>{
    lyricTextEl.classList.remove('exiting');
    lyricTextEl.innerHTML='';
    if(lineIdx<0||lineIdx>=LINES.length) return;

    const line=LINES[lineIdx];
    line.words.forEach((wd,i)=>{
      if(i>0){
        const sp=document.createElement('span');
        sp.className='word-space';
        sp.textContent=' ';
        lyricTextEl.appendChild(sp);
      }
      const span=document.createElement('span');
      span.className='word';
      span.dataset.wi=i;
      span.textContent=wd.w;
      lyricTextEl.appendChild(span);
    });

    lyricTextEl.classList.add('entering');
    setTimeout(()=>lyricTextEl.classList.remove('entering'),600);
    spawnRipple();
  },380);
}

// ─── WORD HIGHLIGHT ───
function updateWords(t) {
  if(curLineIdx<0||curLineIdx>=LINES.length) return;
  const line=LINES[curLineIdx];
  const spans=lyricTextEl.querySelectorAll('.word');
  spans.forEach((sp,i)=>{
    const wd=line.words[i];
    if(!wd) return;
    sp.classList.remove('lit','past');
    if(t>=wd.t&&t<wd.e) sp.classList.add('lit');
    else if(t>=wd.e)     sp.classList.add('past');
  });
}

// ─── ACTIVE LINE ───
// Returns the index of the line whose window [t, end) contains `t`.
// Also accepts the line whose start is nearest but not yet reached (look-ahead 0.3s)
// so that the transition animation lands just before the words appear.
function getLineIdx(t) {
  for(let i=0;i<LINES.length;i++){
    if(t>=LINES[i].t&&t<LINES[i].end) return i;
  }
  return -1;
}

// ─── EMOTION ───
function updateEmotion(t) {
  let idx=0;
  for(let i=0;i<EMOTIONS.length;i++){
    if(EMOTIONS[i].t<=t) idx=i;
  }
  if(idx===curEmotionIdx) return;
  curEmotionIdx=idx;
  const e=EMOTIONS[idx];
  bgEl.style.background=e.bg;
  document.documentElement.style.setProperty('--glow-color',e.gc);
  document.documentElement.style.setProperty('--emotion-label-color',e.gc);
  emotionTextEl.textContent=e.label;
  setIcon(emotionIconEl,e.icon);
  emotionIconEl.style.stroke=e.gc;
  if(e.label==='broken'||e.label==='grief'){
    hbEl.classList.remove('flash');
    void hbEl.offsetWidth;
    hbEl.classList.add('flash');
  }
  spawnParticles(e.gc);
}

// ─── PARTICLES ───
function spawnParticles(color){
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    p.className='pt';
    const sz=Math.random()*3+1;
    const dur=4+Math.random()*5;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${color};left:${10+Math.random()*80}%;bottom:${5+Math.random()*30}%;animation-duration:${dur}s;animation-delay:${Math.random()*2}s;`;
    particlesEl.appendChild(p);
    setTimeout(()=>p.remove(),(dur+2)*1000);
  }
}

// ─── RIPPLE ───
function spawnRipple(){
  const r=document.createElement('div');
  r.className='ripple';
  r.style.cssText=`left:${40+Math.random()*20}%;top:${35+Math.random()*30}%;width:60px;height:60px;`;
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),2100);
}

// ─── TICK ───
function tick(ts){
  if(!playing) return;
  let t;
  const useAudio=!audio.paused&&audio.readyState>=2;
  if(useAudio){
    t=audio.currentTime;
    lastStamp=null;
  } else {
    if(lastStamp!==null) fakeTime+=(ts-lastStamp)/1000;
    lastStamp=ts;
    t=fakeTime;
    if(t>=DURATION){t=DURATION;playing=false;setIcon(playIcon,'play');}
  }

  seekEl.value=t;
  progressFill.style.width=((t/DURATION)*100)+'%';
  timeEl.textContent=`${fmt(t)} / ${fmt(DURATION)}`;

  const li=getLineIdx(t);
  if(li!==curLineIdx) renderLine(li);
  updateWords(t);
  updateEmotion(t);

  rafId=requestAnimationFrame(tick);
}

// ─── PLAY / PAUSE ───
function play(){
  playing=true; lastStamp=null;
  setIcon(playIcon,'pause');
  audio.play().catch(()=>{});
  rafId=requestAnimationFrame(tick);
}
function pause(){
  playing=false;
  setIcon(playIcon,'play');
  audio.pause();
  if(rafId) cancelAnimationFrame(rafId);
}

playBtn.addEventListener('click',()=>{ playing?pause():play(); });

seekEl.addEventListener('input',()=>{
  const v=parseFloat(seekEl.value);
  fakeTime=v;
  if(audio.readyState>=1) audio.currentTime=v;
  updateEmotion(v);
  const li=getLineIdx(v);
  if(li!==curLineIdx){curLineIdx=-1;renderLine(li);}
  updateWords(v);
  progressFill.style.width=((v/DURATION)*100)+'%';
  timeEl.textContent=`${fmt(v)} / ${fmt(DURATION)}`;
});

splash.addEventListener('click',()=>{
  splash.classList.add('gone');
  setTimeout(()=>splash.style.display='none',1500);
  play();
});

audio.addEventListener('ended',()=>{
  playing=false;
  setIcon(playIcon,'play');
  curLineIdx=-1;
  lyricTextEl.innerHTML='';
});

setInterval(()=>{
  if(Math.random()>.7) spawnParticles('rgba(160,100,200,0.2)');
},3000);

// ─── INIT ───
bgEl.style.background=EMOTIONS[0].bg;
document.documentElement.style.setProperty('--glow-color',EMOTIONS[0].gc);
document.documentElement.style.setProperty('--emotion-label-color',EMOTIONS[0].gc);
</script>
