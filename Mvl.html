<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Music:)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@100;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --lyric-color: rgba(255,255,255,0.92);
    --lyric-dim: rgba(255,255,255,0.18);
    --lyric-glow: rgba(200,180,220,0.4);
    --transition-speed: 0.6s;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: #0a0610;
    color: white;
    -webkit-font-smoothing: antialiased;
  }

  #scene {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* ── Background layers ── */
  #bg-layer {
    position: absolute; inset: 0;
    z-index: 0;
    transition: background 4s ease;
  }

  .bg-stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 8%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 90% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 75% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 30%, rgba(255,255,255,0.4) 0%, transparent 100%);
    animation: twinkle 8s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes twinkle {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
  }

  .bg-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }

  #particles {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
    pointer-events: none;
  }

  @keyframes float-up {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    10% { opacity: 0.6; transform: translateY(-8px) scale(1); }
    90% { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
  }

  /* ── Lyric display ── */
  #lyric-container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px 30px;
    max-width: min(700px, 92vw);
    width: 100%;
    display: flex; flex-direction: column; align-items: center;
    gap: 10px;
  }

  .lyric-line {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(1.4rem, 4.5vw, 2.4rem);
    font-weight: 300;
    line-height: 1.5;
    letter-spacing: 0.04em;
    color: var(--lyric-dim);
    transition: color var(--transition-speed) ease, text-shadow var(--transition-speed) ease, transform var(--transition-speed) ease, opacity var(--transition-speed) ease;
    transform: translateY(0);
    pointer-events: none;
    text-align: center;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .lyric-line.active {
    color: var(--lyric-color);
    text-shadow: 0 0 40px var(--lyric-glow), 0 0 80px rgba(180,140,220,0.15);
    transform: translateY(-2px) scale(1.03);
  }

  .lyric-line.just-passed {
    color: rgba(255,255,255,0.35);
    transform: translateY(0);
  }

  /* ── Song info ── */
  #song-info {
    position: fixed; bottom: 28px; left: 0; right: 0;
    z-index: 20;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }

  #song-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    font-weight: 400;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  #progress-bar {
    width: min(200px, 40vw);
    height: 1px;
    background: rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
    border-radius: 1px;
  }

  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, rgba(180,140,220,0.6), rgba(255,255,255,0.5));
    width: 0%;
    transition: width 0.5s linear;
  }

  /* ── Controls ── */
  #controls {
    position: fixed; top: 24px; left: 0; right: 0;
    z-index: 20;
    display: flex; align-items: center; justify-content: center; gap: 20px;
  }

  #play-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.7);
    width: 48px; height: 48px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  #play-btn:hover {
    border-color: rgba(255,255,255,0.5);
    color: white;
    transform: scale(1.08);
  }

  #time-display {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.3);
    min-width: 90px;
    text-align: center;
  }

  #seek-bar {
    -webkit-appearance: none;
    appearance: none;
    width: min(160px, 30vw);
    height: 2px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  #seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: transform 0.2s;
  }
  #seek-bar:hover::-webkit-slider-thumb { transform: scale(1.4); }
  #seek-bar::-moz-range-thumb {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    border: none;
    cursor: pointer;
  }

  /* ── Emotion label ── */
  #emotion-label {
    position: fixed; top: 90px; left: 0; right: 0;
    text-align: center;
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    transition: all 2s ease;
    z-index: 20;
  }

  /* ── Heartbeat pulse ── */
  @keyframes heartbeat {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  #lyric-container.pulse .lyric-line.active {
    animation: heartbeat 1.5s ease-in-out;
  }

  /* ── Splash / tap to start ── */
  #splash {
    position: fixed; inset: 0;
    z-index: 100;
    background: #0a0610;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    cursor: pointer;
    transition: opacity 1.2s ease;
  }

  #splash-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.85);
    text-align: center;
    line-height: 1.3;
  }

  #splash-artist {
    font-family: 'Lato', sans-serif;
    font-weight: 100;
    font-size: clamp(0.7rem, 2vw, 0.9rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  #splash-tap {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-top: 30px;
    animation: breathe 2.5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.55; }
  }

  .hidden { opacity: 0; pointer-events: none; }

  /* ── Audio source note ── */
  #audio-note {
    position: fixed; bottom: 70px; left: 0; right: 0;
    text-align: center;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.18);
    z-index: 20;
    display: none;
  }

  #audio-note a {
    color: rgba(180,140,220,0.5);
    text-decoration: none;
  }

  /* ── Broken heart icon ── */
  #broken-heart {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem;
    opacity: 0;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.5s ease;
    filter: drop-shadow(0 0 20px rgba(180,100,150,0.6));
  }

  /* ── Mobile adjustments ── */
  @media (max-width: 480px) {
    #controls { gap: 12px; }
    #seek-bar { display: none; }
    #lyric-container { gap: 8px; padding: 16px 20px; }
  }
</style>
</head>
<body>

<div id="splash">
  <div class="bg-stars"></div>
  <div id="splash-title">The Night We Met</div>
  <div id="splash-artist">Lord Huron</div>
  <div id="splash-tap">Tap to begin</div>
</div>

<div id="scene">
  <div id="bg-layer">
    <div class="bg-stars"></div>
    <div class="bg-vignette"></div>
  </div>
  <div id="particles"></div>

  <div id="broken-heart">💔</div>

  <div id="controls">
    <button id="play-btn" aria-label="Play / Pause">▶</button>
    <div id="time-display">0:00 / 3:28</div>
    <input type="range" id="seek-bar" min="0" max="208" value="0" step="0.5" aria-label="Seek">
  </div>

  <div id="emotion-label">♡ longing</div>

  <div id="lyric-container"></div>

  <div id="song-info">
    <div id="song-title">The Night We Met &nbsp;·&nbsp; Lord Huron</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>

  <div id="audio-note">
    Add audio file named <code>the-night-we-met.mp3</code> to enable music<br>
    or <a href="https://open.spotify.com/track/0hKRSZhUGEhKU6aNSPBACZ" target="_blank">listen on Spotify ↗</a>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
const LYRICS = [
  { t: 0.0,  text: '' },
  { t: 4.5,  text: 'I am not the only traveler' },
  { t: 9.0,  text: 'Who has not repaid his debt' },
  { t: 13.5, text: 'I\'ve been searching for a trail to follow' },
  { t: 18.5, text: 'Back, the night we met' },
  { t: 26.5, text: 'I had all and then most of you' },
  { t: 31.0, text: 'Some and now none of you' },
  { t: 35.5, text: 'Take me back to the night we met' },
  { t: 43.5, text: 'I don\'t know what I\'m supposed to do' },
  { t: 48.0, text: 'Haunted by the ghost of you' },
  { t: 52.5, text: 'Oh, take me back to the night we met' },
  { t: 62.0, text: '' },
  { t: 68.0, text: 'When the night was full of terrors' },
  { t: 72.5, text: 'And your eyes were filled with tears' },
  { t: 77.0, text: 'With nothing to believe in' },
  { t: 81.5, text: 'But the morning that appeared' },
  { t: 89.0, text: 'I had all and then most of you' },
  { t: 93.5, text: 'Some and now none of you' },
  { t: 98.0, text: 'Take me back to the night we met' },
  { t: 106.0, text: 'I don\'t know what I\'m supposed to do' },
  { t: 110.5, text: 'Haunted by the ghost of you' },
  { t: 115.0, text: 'Oh, take me back to the night we met' },
  { t: 124.0, text: '' },
  { t: 130.0, text: 'I had all and then most of you' },
  { t: 134.5, text: 'Some and now none of you' },
  { t: 139.0, text: 'Take me back to the night we met' },
  { t: 147.0, text: 'I don\'t know what I\'m supposed to do' },
  { t: 151.5, text: 'Haunted by the ghost of you' },
  { t: 156.0, text: 'Oh, take me back to the night we met' },
  { t: 165.0, text: '' },
  { t: 170.0, text: 'Take me back to the night we met' },
  { t: 178.0, text: 'Take me back to the night we met' },
  { t: 186.0, text: 'Take me back to the night we met' },
  { t: 194.0, text: 'Take me back…' },
  { t: 200.0, text: '' },
  { t: 208.0, text: '' }
];

const EMOTIONS = [
  { t: 0,    bg: 'radial-gradient(ellipse at 40% 30%, #1a0f2e 0%, #0a0610 60%, #050308 100%)', label: 'longing', color: 'rgba(160,120,200,0.35)' },
  { t: 4,    bg: 'radial-gradient(ellipse at 50% 40%, #1e1030 0%, #0d0818 60%, #060410 100%)', label: 'lost', color: 'rgba(140,100,180,0.35)' },
  { t: 18,   bg: 'radial-gradient(ellipse at 30% 50%, #2a0a1e 0%, #150614 60%, #080410 100%)', label: 'memory', color: 'rgba(200,100,150,0.4)' },
  { t: 26,   bg: 'radial-gradient(ellipse at 60% 35%, #200820 0%, #120610 60%, #080410 100%)', label: 'grief', color: 'rgba(180,80,160,0.35)' },
  { t: 35,   bg: 'radial-gradient(ellipse at 50% 60%, #1a0520 0%, #0e0414 60%, #080410 100%)', label: 'longing', color: 'rgba(160,100,200,0.4)' },
  { t: 43,   bg: 'radial-gradient(ellipse at 40% 40%, #1e0a28 0%, #0f0418 60%, #080410 100%)', label: 'haunted', color: 'rgba(120,80,180,0.45)' },
  { t: 62,   bg: 'radial-gradient(ellipse at 50% 50%, #0a0610 0%, #060408 100%)', label: 'silence', color: 'rgba(100,80,140,0.2)' },
  { t: 68,   bg: 'radial-gradient(ellipse at 35% 45%, #280818 0%, #160610 60%, #080410 100%)', label: 'terror', color: 'rgba(200,80,100,0.35)' },
  { t: 77,   bg: 'radial-gradient(ellipse at 55% 35%, #1e0a10 0%, #120610 60%, #080410 100%)', label: 'despair', color: 'rgba(180,60,80,0.35)' },
  { t: 89,   bg: 'radial-gradient(ellipse at 45% 55%, #240828 0%, #14061a 60%, #080410 100%)', label: 'grief', color: 'rgba(160,80,200,0.4)' },
  { t: 106,  bg: 'radial-gradient(ellipse at 50% 40%, #1a0628 0%, #100418 60%, #080410 100%)', label: 'haunted', color: 'rgba(120,80,180,0.45)' },
  { t: 124,  bg: 'radial-gradient(ellipse at 50% 50%, #080410 0%, #040208 100%)', label: 'breaking', color: 'rgba(80,60,120,0.25)' },
  { t: 130,  bg: 'radial-gradient(ellipse at 40% 45%, #280a20 0%, #180614 60%, #0a0410 100%)', label: 'grief', color: 'rgba(200,80,160,0.45)' },
  { t: 156,  bg: 'radial-gradient(ellipse at 50% 50%, #200828 0%, #12041a 60%, #080410 100%)', label: 'longing', color: 'rgba(140,80,200,0.5)' },
  { t: 165,  bg: 'radial-gradient(ellipse at 50% 60%, #0e0418 0%, #080410 80%, #040208 100%)', label: 'fading', color: 'rgba(100,60,160,0.3)' },
  { t: 194,  bg: 'radial-gradient(ellipse at 50% 50%, #080410 0%, #040208 100%)', label: '…', color: 'rgba(80,60,120,0.15)' }
];

const WINDOW_LINES = 3;

const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const seekBar = document.getElementById('seek-bar');
const timeDisplay = document.getElementById('time-display');
const progressFill = document.getElementById('progress-fill');
const bgLayer = document.getElementById('bg-layer');
const emotionLabel = document.getElementById('emotion-label');
const lyricContainer = document.getElementById('lyric-container');
const splash = document.getElementById('splash');
const audioNote = document.getElementById('audio-note');
const brokenHeart = document.getElementById('broken-heart');
const particlesEl = document.getElementById('particles');

let isPlaying = false;
let audioLoaded = false;
let currentLyricIdx = -1;
let currentEmotionIdx = -1;
let rafId = null;
let fakeTime = 0;
let lastTs = null;

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function buildLyricDOM() {
  lyricContainer.innerHTML = '';
  const visible = LYRICS.filter(l => l.text !== '');
  visible.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'lyric-line';
    div.dataset.idx = i;
    div.dataset.t = l.t;
    div.textContent = l.text;
    lyricContainer.appendChild(div);
  });
}

function getActiveIdx(t) {
  let idx = -1;
  for (let i = 0; i < LYRICS.length; i++) {
    if (LYRICS[i].t <= t && LYRICS[i].text !== '') idx = i;
    else if (LYRICS[i].t > t) break;
  }
  return idx;
}

function getEmotionIdx(t) {
  let idx = 0;
  for (let i = 0; i < EMOTIONS.length; i++) {
    if (EMOTIONS[i].t <= t) idx = i;
  }
  return idx;
}

const visibleLines = Array.from(lyricContainer.children);

function updateLyrics(t) {
  const lyricLines = Array.from(lyricContainer.querySelectorAll('.lyric-line'));
  const activeT = LYRICS.slice().reverse().find(l => l.t <= t && l.text !== '');
  if (!activeT) {
    lyricLines.forEach(el => { el.classList.remove('active','just-passed'); });
    return;
  }
  const activeTime = activeT.t;

  lyricLines.forEach(el => {
    const elT = parseFloat(el.dataset.t);
    el.classList.remove('active','just-passed');
    if (elT === activeTime) {
      el.classList.add('active');
    } else if (elT < activeTime) {
      el.classList.add('just-passed');
    }
  });

  // scroll active into view
  const activeEl = lyricContainer.querySelector('.lyric-line.active');
  if (activeEl) {
    activeEl.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
  }
}

function updateEmotion(t) {
  const idx = getEmotionIdx(t);
  if (idx === currentEmotionIdx) return;
  currentEmotionIdx = idx;
  const e = EMOTIONS[idx];

  const stars = bgLayer.querySelector('.bg-stars');
  const vignette = bgLayer.querySelector('.bg-vignette');
  bgLayer.style.transition = 'background 4s ease';
  bgLayer.style.background = e.bg;

  emotionLabel.style.color = e.color;
  emotionLabel.textContent = `♡ ${e.label}`;

  document.documentElement.style.setProperty('--lyric-glow', e.color);

  spawnParticles(e.color);
}

function spawnParticles(color) {
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 1;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      left:${Math.random()*100}%;
      bottom:${Math.random()*40}%;
      animation-duration:${3 + Math.random()*4}s;
      animation-delay:${Math.random()*2}s;
    `;
    particlesEl.appendChild(p);
    setTimeout(() => p.remove(), 8000);
  }
}

function updateProgress(t, dur) {
  const pct = dur ? (t / dur) * 100 : 0;
  progressFill.style.width = pct + '%';
  seekBar.value = t;
  timeDisplay.textContent = `${fmt(t)} / ${fmt(dur || 208)}`;
}

function tick(ts) {
  if (!isPlaying) return;

  let t;
  if (audioLoaded && !audio.paused) {
    t = audio.currentTime;
    const dur = audio.duration || 208;
    updateProgress(t, dur);
    seekBar.max = dur;
  } else {
    if (lastTs !== null) {
      fakeTime += (ts - lastTs) / 1000;
    }
    lastTs = ts;
    t = fakeTime;
    if (t > 208) { t = 208; isPlaying = false; playBtn.textContent = '▶'; }
    updateProgress(t, 208);
  }

  updateLyrics(t);
  updateEmotion(t);

  rafId = requestAnimationFrame(tick);
}

function startPlayback() {
  isPlaying = true;
  lastTs = null;
  playBtn.textContent = '⏸';
  if (audioLoaded) {
    audio.play().catch(() => {});
  }
  rafId = requestAnimationFrame(tick);
}

function pausePlayback() {
  isPlaying = false;
  playBtn.textContent = '▶';
  if (audioLoaded) audio.pause();
  if (rafId) cancelAnimationFrame(rafId);
}

playBtn.addEventListener('click', () => {
  if (isPlaying) pausePlayback();
  else startPlayback();
});

seekBar.addEventListener('input', () => {
  const val = parseFloat(seekBar.value);
  fakeTime = val;
  if (audioLoaded) audio.currentTime = val;
  updateLyrics(val);
  updateEmotion(val);
  updateProgress(val, audioLoaded ? (audio.duration || 208) : 208);
});

audio.addEventListener('loadedmetadata', () => {
  audioLoaded = true;
  seekBar.max = audio.duration;
  audioNote.style.display = 'none';
});

audio.addEventListener('error', () => {
  audioLoaded = false;
  audioNote.style.display = 'block';
});

audio.src = 'the-night-we-met.mp3';

splash.addEventListener('click', () => {
  splash.classList.add('hidden');
  setTimeout(() => { splash.style.display = 'none'; }, 1300);
  startPlayback();
});

buildLyricDOM();

// Initial state
bgLayer.style.background = EMOTIONS[0].bg;
emotionLabel.textContent = `♡ ${EMOTIONS[0].label}`;
emotionLabel.style.color = EMOTIONS[0].color;
updateProgress(0, 208);
